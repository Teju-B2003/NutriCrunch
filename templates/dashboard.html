<div class="dashboard-card">
    <h2>Products</h2>

    <form action="/update_all_products" method="POST">
        <table>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Weight</th>
                <th>Stock</th>
                <th>Status</th>
            </tr>

            {% for product in products %}
            <tr>
                <td>
                    {% if product.image %}
                    <img src="{{ url_for('static', filename='uploads/' + product.image) }}"
                         width="70" style="border-radius:10px;">
                    {% else %}
                    <img src="{{ url_for('static', filename='images/' + get_product_image(product.name)) }}"
                         width="70" style="border-radius:10px;">
                    {% endif %}
                </td>

                <td>
                    {{ product.name }}
                    <input type="hidden" name="product_id" value="{{ product.id }}">
                </td>

                <td>{{ product.category }}</td>

                <td>
                    <input
                        name="price_{{ product.id }}"
                        value="{{ product.price }}"
                        style="width:80px;">
                </td>

                <td>
                    <input
                        name="weight_{{ product.id }}"
                        value="{{ product.weight }}"
                        style="width:80px;">
                </td>

                <td>
                    <input
                        name="stock_{{ product.id }}"
                        value="{{ product.stock }}"
                        style="width:80px;">
                </td>

                <td>
                    <select name="available_{{ product.id }}">
                        <option value="true"
                            {% if product.available %}selected{% endif %}>
                            In Stock
                        </option>

                        <option value="false"
                            {% if not product.available %}selected{% endif %}>
                            Out of Stock
                        </option>
                    </select>
                </td>
            </tr>
            {% endfor %}
        </table>

        <div style="margin-top:25px; text-align:center;">
            <button type="submit"
                    style="padding:16px 40px; font-size:20px;">
                Save All Changes
            </button>
        </div>
    </form>
</div>
